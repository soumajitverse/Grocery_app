name: Ping Render App

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (safer than 13)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          curl --retry 3 --retry-delay 5 --fail https://baskito-grocery-app-current.onrender.com || exit 1
